version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: finca_hml
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - '8080:8080'
    depends_on:
      - db

volumes:
  db_data:
